name: "Vitamin B9"
abbreviations: ["B9", "Folate", "Folic Acid"]
synonyms: ["Folinic acid", "Leucovorin", "Levomefolic acid"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Serum Folate"
alternative_biomarker: "Erythrocyte Folate (Red Blood Cell Folate)"
units:
  primary: "ng/mL"
  info: "Folate body stores in healthy adults range from 0.5 to 20 mg."
functions:
  - "Synthesis of DNA and RNA"
  - "Production of new cells, including red blood cells"
  - "Prevention of neural tube defects in fetus"
  - "Synthesis of amino acids"
  - "Lowering blood homocysteine levels (converts homocysteine to methionine)"
rda:
  adults: "400 DFE"
  pregnancy: "600 DFE"
  breastfeeding: "500 DFE"
  conversions: "1 DFE = 1 mcg food folate = 0.6 mcg folic acid (fortified/supplements)"
food_sources:
  high_plant: ["Fortified ready-to-eat cereals", "Cornmeal", "Rice", "Wheat", "Legumes", "Quinoa", "Orange juice", "Dark green leafy vegetables (spinach, Brussel's sprouts)", "Avocado", "Asparagus", "Artichokes", "Beets", "Sunflower seeds"]
  high_animal: ["Liver", "Mollusks (conch)"]
  other: ["Yeast extract spread", "Baker's yeast"]
  notes: "Cooking can reduce content by 70%, drying by 50%. Vitamin C stimulates absorption."
absorption:
  site: "Upper small intestine"
  effectiveness:
    food_folate: "50%"
    fortified_folic_acid: "85%"
    supplements_empty_stomach: "100%"
thresholds:
  serum_folate:
    deficient:
      value: 3
      unit: "ng/mL"
      note: "Affected by recent intake."
    normal:
      value: 3
      unit: "ng/mL"
      comparison: ">"
  erythrocyte_folate:
    adequate:
      value: 140
      unit: "ng/mL"
      note: "Better indicator of body stores."
recommendations:
  deficient: "Folate deficiency indicated. Risk of megaloblastic anemia and neurological problems. Pregnant women: high risk of neural tube defects. Consult healthcare provider."
  normal: "Folate levels are adequate."
deficiency:
  causes: ["Low intake (alcoholism, anorexia)", "Smoking", "Malabsorption (Celiac, Crohn's, SIBO, Zinc deficiency)", "Increased demand (Pregnancy, Infancy, Cancer)", "Increased loss (Hemodialysis, B12 deficiency)", "Medications (Methotrexate, Phenytoin, Metformin)"]
  symptoms:
    physical: ["Anorexia", "Nausea", "Diarrhea", "Red/sore tongue (glossitis)", "Dysphagia", "Cheilosis", "Patchy brownish skin discoloration", "Low-grade fever", "Fatigue (megaloblastic anemia)"]
    neurological: ["Paresthesia (tingling/numbness)", "Memory loss", "Insomnia", "Depression"]
  complications:
    general: ["Atherosclerosis", "Heart disease", "Alzheimer's disease"]
    pregnancy_fetus: ["Neural tube defects", "Low birth weight", "Miscarriage", "Preeclampsia", "Placental abruption"]
supplements:
  forms_otc: ["Folic acid"]
  forms_prescription: ["Folic acid (1 mg or higher)"]
  effective_for: ["Folate deficiency", "Masking B12 deficiency (Caution: can lead to neurological damage)"]
  likely_effective: ["Reducing neural tube defects", "Lowering homocysteine in kidney disease", "Reducing methotrexate side effects"]
  possibly_effective: ["Depression (with antidepressants)", "Cerebral folate deficiency syndrome", "Reducing stroke risk"]
safety:
  upper_limit: "1 mg/day (Folic acid for adults)"
  side_effects: ["Nausea", "Abdominal cramps", "Diarrhea", "Rash", "Sleep disorders", "Confusion", "Irritability", "Behavior changes", "Seizures (high doses)"]
  toxicity_risks:
    doses_0.8_1.2_mg: "May increase risk of heart attack, lung or cancer (prostate)"
    doses_5mg_plus: "May cause neurological damage"
interactions:
  reducing_absorption: ["Green tea", "Large dose NSAIDs (Aspirin, Ibuprofen)", "Anticonvulsants", "Cholesterol-lowering drugs"]
  reducing_effectiveness: ["Methotrexate", "Phenobarbital", "Phenytoin", "Fosphenytoin", "Primidone", "Pyrimethamine"]
  adverse_combinations: ["5-fluorouracil or capecitabine (stomach problems)"]
notes:
  etymology: "From Latin 'folium' meaning leaf."
  treatment_caution: "Folic acid can mask B12 deficiency. Megaloblastic anemia cause must be determined before treatment."
  potassium_iron_note: "High folate doses may require potassium and iron supplements."
