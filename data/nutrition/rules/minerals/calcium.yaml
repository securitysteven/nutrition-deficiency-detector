name: "Calcium"
symbol: "Ca"
type: "Essential Mineral"
biomarker: "Calcium (Serum)"
units:
  primary: "mg/dL"
  secondary: "mmol/L"
  conversion: "1 mg/dL = 0.25 mmol/L"
functions:
  - "Gives strength to bones and teeth"
  - "Enables proper functioning of nerves, muscles, gut, heart, and blood vessels"
  - "Participates in blood coagulation"
  - "Production of energy from carbohydrates"
rda:
  infants_0_6m: "200 mg/day (AI)"
  infants_7_12m: "260 mg/day (AI)"
  children_1_3y: "700 mg/day"
  children_4_8y: "1000 mg/day"
  youth_9_18y: "1300 mg/day (includes pregnancy/breastfeeding)"
  adults_19_70y: "1000 mg/day (includes pregnancy/breastfeeding)"
  adults_71y_plus: "1200 mg/day"
food_sources:
  dairy: ["Cheese (American, Gruyere, Romano, Swiss, Cheddar, etc.)", "Milk (Sheep, Cow, Goat)", "Yogurt", "Whey"]
  non_dairy:
    meat_fish: ["Sardines (with bones)", "Canned mackerel/salmon (with bones)", "Crabs", "Cuttlefish", "Shrimps"]
    vegetables_beans: ["Radishes (oriental, dried)", "Lambsquarters", "Taro", "Blackstrap molasses", "Amaranth leaves", "Collards", "Turnip greens", "Soybeans", "Cowpeas", "Tempeh", "Bok choi", "Kale", "Okra"]
    nuts_seeds: ["Almond milk", "Chia seeds", "Sesame seeds", "Almonds", "Coconut water"]
    fruits: ["Figs (dried)", "Kiwi fruit", "Orange", "Prickly pear", "Prunes"]
    water: ["Mineral water", "Hard tap water"]
  fortified: ["Cereals", "Tofu (with calcium sulfate)", "Formulated bars", "Orange juice", "Soy milk", "Rice drink"]
  inhibitors: ["Oxalic acid (spinach, rhubarb)", "Phytic acid (dried beans, wheat bran)"]
  notes: "Calcium from kale and soybeans is absorbed well. Hard water can be a convenient source."
thresholds:
  deficient:
    value: 8.6
    unit: "mg/dL"
  normal:
    range: [8.6, 10.2]
    unit: "mg/dL"
  high:
    value: 10.5
    unit: "mg/dL"
recommendations:
  deficient: "Hypocalcemia (<8.6 mg/dL). Risk of osteoporosis, rickets (children), and acute symptoms like paresthesia or cramps. Check Vitamin D and Magnesium levels."
  normal: "Calcium levels are normal (8.6-10.2 mg/dL)."
  high: "Hypercalcemia (>10.5 mg/dL). May be caused by hyperparathyroidism, cancer, or excessive Vitamin D/Calcium intake. Consult a physician."
deficiency:
  at_risk: ["Postmenopausal women (low estrogen)", "Female athletes with amenorrhea", "Vegans", "Young alcoholics"]
  causes: ["Hypoparathyroidism", "Vitamin D deficiency", "Acute pancreatitis", "Kidney failure", "Malabsorption (Celiac, Crohn's, SIBO, Gastric bypass)", "Hypomagnesemia", "Medications (Steroids, Laxatives, Gastric acid-lowering drugs)"]
  symptoms_acute: ["Paresthesia (numbness/tingling in fingers/toes/mouth)", "Muscle cramps/spasms", "Muscle twitching", "Lightheadedness", "Arrhythmia", "Seizures"]
  symptoms_chronic: ["Dry/itchy skin and hair", "Psoriasis", "Brittle nails", "Cataracts", "Memory loss/Dementia", "Osteoporosis", "Rickets (children)"]
supplements:
  types:
    - name: "Calcium Carbonate"
      notes: "40% elemental Ca; take with food; also used as antacid."
    - name: "Calcium Citrate"
      notes: "21% elemental Ca; take with or without food; good for low gastric acid or kidney stone risk."
    - name: "Calcium Lactate/Gluconate"
      notes: "Highly soluble; often used in solutions."
    - name: "Other forms"
      notes: "Coral calcium, Rock calcium, Calcium phosphate, Calcium orotate, Calcium hydroxyapatite."
  effective_for: ["Prevention and treatment of calcium deficiency", "Hyperkalemia (IV)", "Lowering phosphate in kidney failure", "Heartburn (Carbonate)"]
  likely_effective: ["Reducing thyroid hormone in kidney failure"]
  dosage: "Typical dose for deficiency is 1g elemental calcium per day. Best absorbed in doses ≤500mg at once."
safety:
  upper_limit:
    infants_0_6m: "1000 mg/day"
    infants_7_12m: "1500 mg/day"
    children_1_8y: "2500 mg/day"
    youth_9_18y: "3000 mg/day"
    adults_19_50y: "2500 mg/day"
    adults_51y_plus: "2000 mg/day"
  side_effects: ["Constipation", "Bloating"]
  overdose_complications: ["Milk-alkali syndrome (kidney calcification/failure)", "Increased risk of prostate cancer (>1000mg/day suggested by some studies)", "Calcium deposits (calcification)"]
  pregnancy_category: "Carbonate/Phosphate: Not classified; Acetate/Citrate/Gluconate: Category C."
interactions:
  nutrients:
    - "Oxalate/Phytates decrease absorption"
    - "Caffeine slightly decreases absorption"
    - "Vitamin D required for absorption"
  drugs: ["Thiazide diuretics (increase levels)", "Gastric acid-lowering drugs (decrease absorption)", "Corticosteroids (decrease absorption)"]
notes:
  - "Hard water is defined by high calcium/magnesium content."
  - "99% of body calcium is stored in bones."
  - "Blood levels are tightly regulated and may stay normal even if bone density is decreasing."
