name: "Sodium"
synonyms: ["Natrium"]
symbol: "Na"
type: "Mineral"
biomarker: "Sodium (Serum)"
units:
  primary: "mmol/L"
  secondary: "mEq/L"
functions:
  - "Maintains electrical charge across cell membranes for nerve, muscle, and heart function"
  - "Enhances absorption of chloride, glucose, amino acids, and water in the small intestine"
  - "Promotes water retention in the body"
  - "Involved in regulation of blood volume and pressure via aldosterone"
rda:
  minimal_requirement: "200 mg (500 mg salt) per day for adults"
  recommendation_aha: "Less than 1500 mg (3.8 g salt) per day"
  infants_0_6m: "120 mg/day (AI)"
  infants_7_12m: "370 mg/day (AI)"
food_sources:
  high_animal: ["Dried, salted fish", "Dry soup mixes", "Breaded shrimp", "Fish sauce", "Ham", "Corned beef", "Burritos", "Pizza", "Cheeseburgers", "Canned stews", "Processed cheeses", "Frankfurters", "Salami", "Cottage cheese", "Bacon", "Canned sardines", "Milk", "Eggs"]
  high_plant: ["Pickled vegetables (eggplant, cucumbers, olives)", "Pretzels", "Soy sauce", "Miso", "Tofu", "Canned tomato juice/sauce", "Canned beans", "Salted potato chips", "Ketchup", "Salted peanuts/crackers", "Yeast extract spread", "Bread (white/rye)"]
  beverages: ["Sport and energy drinks", "Mineral waters", "Coconut water", "Tomato juice"]
  medications: ["Sodium bicarbonate (antacid)", "Sodium phosphate (laxative)", "Naproxen sodium", "Diclofenac sodium"]
thresholds:
  deficient:
    value: 136
    unit: "mmol/L"
    label: "Hyponatremia"
  normal:
    range: [136, 145]
    unit: "mmol/L"
  high:
    value: 145
    unit: "mmol/L"
    label: "Hypernatremia"
recommendations:
  deficient: "Hyponatremia. Usually due to water retention or excessive water intake. Symptoms: headache, nausea, fatigue. Severe cases: muscle cramps, seizures. Treatment depends on cause (fluid restriction, saline infusion)."
  normal: "Sodium levels are normal. Follow AHA recommendations for salt intake (less than 1.5g sodium/day)."
  high: "Hypernatremia. Most commonly caused by insufficient water intake. Symptoms: thirst, dizziness, muscle twitches, swelling. Severe cases can be fatal."
deficiency:
  causes:
    loss: ["Persistent vomiting", "Severe diarrhea", "Prolonged sweating", "Extensive burns", "Kidney/brain disorders with polyuria"]
    medications: ["Certain diuretics", "Morphine", "Tricyclic antidepressants", "Caffeine intoxication"]
    water_retention: ["Heart/kidney failure", "Liver cirrhosis", "Addison's disease", "SIADH (due to brain damage, tumors, etc.)", "Ecstasy (MDMA)"]
    other: ["Water intoxication (excessive intake + low-sodium diet)", "Bowel cleansing before surgery"]
  symptoms: ["Headache", "Nausea", "Vomiting", "Fatigue", "Faintness", "Muscle cramps", "Seizures", "Brain swelling (cerebral edema)"]
toxicity:
  acute_dangers: ["Nausea", "Vomiting", "Abdominal cramps", "Diarrhea", "Fatal hypernatremia (e.g., from salt solution first aid)"]
  chronic_risks:
    - "High Blood Pressure (especially in salt-sensitive individuals)"
    - "Gastric Cancer (associated with salted/smoked/pickled foods and H. pylori)"
    - "Possible association with Osteoporosis"
  salt_sensitivity: "Common in older adults, Afro-Americans, and individuals with diabetes or CKD."
notes:
  low_sodium_diet: "Defined as <2g sodium/day. Used for CHF, kidney failure, cirrhosis, and hypertension. Tips: do not add salt, avoid processed/canned foods, check medication sodium content."
  sport_drinks: "Sport drinks with 460-1150 mg sodium/liter are effective for exercises >2 hours. Oral Rehydration Solution (ORS) by WHO contains 410 mg sodium/cup."
  interactions: "High sodium intake increases calcium excretion (potential risk for kidney stones/osteoporosis)."
  absorption_regulation: "Regulated by aldosterone. Absorption increases in chronic pancreatitis with steatorrhea; decreased in chronic alcoholics."
