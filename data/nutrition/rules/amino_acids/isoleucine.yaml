name: "Isoleucine"
abbreviation: "Ile"
type: "Essential Amino Acid (BCAA)"
biomarker: "Isoleucine (Plasma)"
units:
  primary: "mcmol/L"
functions:
  - "Synthesis of hemoglobin and other proteins"
  - "Detoxification of nitrogen wastes"
  - "Wound healing and immunity"
  - "Glucogenic (can be converted into glucose)"
  - "Ketogenic (can be converted into ketones)"
food_sources:
  high_animal: ["Pork", "Beef", "Veal", "Lamb", "Chicken", "Turkey", "Fish", "Cheese"]
  high_plant: ["Wheat germ", "Legumes", "Seeds", "Baker’s yeast"]
  low_content: ["Cereals (except wheat germ)", "Fruits", "Vegetables"]
thresholds:
  deficient:
    value: 40
    unit: "mcmol/L"
  normal:
    range: [40, 110]
    unit: "mcmol/L"
recommendations:
  deficient: "Low isoleucine levels may indicate protein deficiency or specific metabolic issues. Symptoms can include dermatitis, diarrhea, and vision disturbances."
  normal: "Isoleucine levels are within the normal range."
deficiency:
  causes: ["Isoleucine-free diet (used in treating metabolic disorders)", "Severe protein malnutrition"]
  symptoms: ["Eye cornea damage (vision disturbance)", "Dermatitis", "Diarrhea"]
supplements:
  forms_otc: ["L-isoleucine"]
  probably_ineffective: ["Prevention or treatment of hot flushes in postmenopausal women"]
  insufficient_evidence: ["Increasing muscle mass", "Improving athletic performance", "Prevention of deficiency on protein-restricted diets", "Reduction of acute diarrhea in children (when added to ORS)"]
  safety_notes: "Safety profile is generally described under branched-chain amino acids (BCAA)."
notes:
  medical_conditions:
    limit_intake: ["Maple syrup urine disease (MSUD)", "Methylmalonic acidemia", "Propionic acidemia"]
  classification: "One of the three branched-chain amino acids (BCAA)."
