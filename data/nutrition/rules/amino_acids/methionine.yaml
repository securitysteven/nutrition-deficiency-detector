name: "Methionine"
abbreviation: "Met"
type: "Essential Amino Acid"
biomarker: "Methionine (Plasma)"
unit: "mcmol/L"
functions:
  - "Building block of proteins"
  - "Glucogenic amino acid (can be converted into glucose)"
  - "Source of sulfur"
  - "Precursor of carnitine (helps convert fats into energy)"
  - "Helps the liver to efficiently process fats"
food_sources:
  high:
    animal: ["Beef", "Pork", "Poultry", "Fish", "Crabs", "Mollusks", "Cheese", "Egg white"]
    plant: ["Whole grains", "Cornmeal", "Nuts", "Seeds"]
  low: ["Fruits", "Lentils", "Green leafy vegetables"]
thresholds:
  low:
    value: 15
    unit: "mcmol/L"
  normal:
    range: [15, 45]
    unit: "mcmol/L"
recommendations:
  low: "Methionine levels are low. Increase intake of methionine-rich foods such as beef, pork, poultry, fish, eggs, whole grains, nuts, and seeds."
  normal: "Methionine levels are normal."
effective_for:
  insufficient_evidence:
    - "Prevention or treatment of alcoholism"
    - "Allergies"
    - "Asthma"
    - "Colorectal cancer"
    - "Parkinson's disease"
    - "Radiation side effects"
    - "Schizophrenia"
    - "Drug withdrawal symptoms"
    - "Improving liver function"
  possibly_ineffective:
    - "Prevention of hot flashes in menopausal women"
supplements:
  info: "Nonprescription (over-the-counter) L-methionine oral supplements are available."
  safety: "Possibly safe for most adults and children in recommended doses. Side effects may include nausea, vomiting, and drowsiness."
  warnings:
    - "Avoid during pregnancy and breastfeeding (insufficient evidence)."
    - "Allergic reactions are possible (itchy skin, rash, difficulty breathing, swelling)."
disorders:
  hypermethioninemia:
    description: "Rare hereditary disorder (usually autosomal recessive) with increased blood levels of methionine."
    symptoms: "Intellectual disabilities, delays in standing or walking, muscle weakness, unusual facial features, boiled cabbage-smelling breath/sweat/urine."
    causes: "Genetic, or diets high in methionine in infants."
    notes: "May occur with homocystinuria, tyrosinemia, and galactosemia."
  conditions_to_avoid_methionine:
    description: "Individuals with these conditions may need to avoid methionine supplements or high-methionine foods."
    list:
      - "Homocystinuria"
      - "Tyrosinemia"
      - "Galactosemia"
      - "Acidosis"
      - "Liver cirrhosis"
      - "Schizophrenia"
      - "Methylenetetrahydrofolate reductase (MTHFR) deficiency"
