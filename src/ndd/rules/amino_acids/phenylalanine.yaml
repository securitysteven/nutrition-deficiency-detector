name: "Phenylalanine"
abbreviation: "Phe"
type: "Essential Amino Acid"
biomarker: "Phenylalanine (Plasma)"
unit: "mcmol/L"
functions:
  - "Building block of proteins"
  - "Glucogenic amino acid (can be converted into glucose)"
  - "Ketogenic amino acid (can be converted into ketones)"
  - "Precursor of tyrosine (further converted to thyroxine/thyroid hormone)"
  - "Precursor of melanin (pigment in skin, hair, and iris)"
  - "Precursor of epinephrine (adrenaline)"
  - "Precursor of norepinephrine (noradrenaline) - stimulating neurotransmitter"
  - "Precursor of dopamine - inhibitory neurotransmitter"
food_sources:
  high:
    animal: ["Meat", "Fish", "Cheese"]
    plant: ["Beans", "Wheat germ", "Lentils", "Seeds", "Nuts", "Baker's yeast", "Spirulina"]
  low: ["Cereals (except wheat germ)", "Fruits", "Vegetables"]
thresholds:
  low:
    value: 35
    unit: "mcmol/L"
  normal:
    range: [35, 85]
    unit: "mcmol/L"
recommendations:
  low: "Phenylalanine levels are low. Increase intake of protein-rich foods such as meat, fish, cheese, beans, and lentils."
  normal: "Phenylalanine levels are normal."
effective_for:
  possibly_effective:
    - "Treatment of vitiligo (in combination with sun exposure)"
  possibly_ineffective:
    - "Reducing appetite"
    - "Treatment of ADHD"
    - "Relieving chronic pain"
  insufficient_evidence:
    - "Alcohol withdrawal symptoms"
    - "Arthritis"
    - "Depression"
    - "Multiple sclerosis"
    - "Parkinson's disease"
    - "Phenylketonuria"
    - "Phenylalanine deficiency with tyrosinemia"
    - "Anesthetic in acupuncture"
supplements:
  info: "Available as L-phenylalanine (natural), D-phenylalanine (synthetic), and DL-phenylalanine (DLPA). L-phenylalanine is produced utilizing E. coli."
  safety: "L-phenylalanine is possibly safe in recommended doses. Safety of D-phenylalanine is unknown. Doses > 5 g/day may cause nerve damage."
  side_effects: "Nausea, heartburn, headache. DL-phenylalanine can cause anxiety and hyperactivity in children."
  warnings:
    - "Avoid during pregnancy and breastfeeding."
    - "Avoid in patients with schizophrenia."
    - "Avoid in patients with high blood phenylalanine (PKU, alkaptonuria)."
    - "Children with ADHD should not take DL- or D-phenylalanine."
  interactions:
    - "MAO inhibitors (antidepressants): may cause hypertensive crisis (heart attack/stroke risk)."
    - "Levodopa: may decrease effectiveness."
    - "Baclofen: may decrease effectiveness."
    - "Antipsychotics (e.g., chlorpromazine, haloperidol): may worsen involuntary movements."
disorders:
  phenylketonuria_pku:
    description: "Rare hereditary disorder where phenylalanine cannot be metabolized, affecting the brain and melanin synthesis."
    symptoms: "Light skin/hair/eyes, small head size, seizures, eczema, tremors, musty odor."
    treatment: "Life-long low-protein diet, no animal foods, restriction of aspartame. Special formulas available."
  alkaptonuria:
    description: "Rare inherited disorder where phenylalanine and tyrosine cannot be properly metabolized, leading to homogentisic acid accumulation."
    symptoms: "Darkening of urine, grey ear discoloration, dark eye spots, arthritis, heart valve disorders."
    treatment: "Low-phenylalanine and low-tyrosine diet, high doses of vitamin C."
notes:
  - "Pregnant women with high phenylalanine levels have increased risk of birth defects."
  - "Aspartame (sweetener) contains phenylalanine and must be avoided in PKU."
