name: "Leucine"
abbreviation: "Leu"
type: "Essential Amino Acid (BCAA)"
biomarker: "Leucine (Plasma)"
unit: "mcmol/L"
functions:
  - "Synthesis of hemoglobin, other proteins, and hormones"
  - "Regulation of blood sugar levels"
  - "Growth and repair of bones and muscles"
  - "Wound healing"
  - "Ketogenic amino acid (can be converted into ketones)"
  - "Non-glucogenic amino acid (cannot be converted into glucose)"
food_sources:
  high:
    animal: ["Beef", "Pork", "Chicken", "Turkey", "Fish", "Cheese"]
    plant: ["Cereals", "Legumes", "Nuts", "Seeds", "Baker's yeast", "Spirulina"]
  low: ["Fruits", "Vegetables"]
thresholds:
  low:
    value: 70
    unit: "mcmol/L"
  normal:
    range: [70, 170]
    unit: "mcmol/L"
recommendations:
  low: "Leucine levels are low. Increase intake of protein-rich foods such as beef, pork, poultry, fish, cheese, cereals, legumes, nuts, and seeds."
  normal: "Leucine levels are normal."
effective_for:
  possibly_effective:
    - "Enhancing protein synthesis and promoting muscle growth (especially when added to protein after exercise)"
  probably_ineffective:
    - "Increasing short-term physical performance or strength"
    - "Increasing long-term physical performance or preventing muscle loss in various illnesses"
    - "Preventing muscle loss during immobilization"
    - "Reducing blood glucose levels in diabetes type 2"
supplements:
  info: "Oral L-leucine supplements are available over-the-counter."
  safety: "Safety is generally described under branched-chain amino acids (BCAAs)."
  warnings:
    - "Limit intake in individuals with Isovaleric acidemia or Maple syrup urine disease (MSUD)."
disorders:
  isovaleric_acidemia:
    description: "Hereditary disorder of leucine metabolism causing buildup of isovaleric acid in blood, urine, and brain."
    symptoms: "Shaking, hypothermia, poor feeding, vomiting, coma, death (acute); recurrent vomiting, extreme tiredness, 'sweaty feet' odor (chronic)."
    treatment: "Life-long low-protein diet, carnitine and glycine supplements."
  maple_syrup_urine_disease:
    description: "Metabolic disorder requiring limited leucine intake."
