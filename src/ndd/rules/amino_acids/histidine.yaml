name: "Histidine"
abbreviation: "His"
type: "Essential Amino Acid"
biomarker: "Histidine (Plasma)"
unit: "mcmol/L"
functions:
  - "Building block of proteins"
  - "Precursor of the neurotransmitter histamine"
  - "Precursor of the dipeptide carnosine (together with beta-alanine)"
  - "Glucogenic amino acid (can be converted into glucose)"
  - "Basic (pH > 7) amino acid"
food_sources:
  high:
    animal: ["Pork", "Beef", "Chicken", "Turkey", "Fish", "Cheese"]
    plant: ["Legumes"]
  low: ["Wheat", "Fruits", "Vegetables"]
thresholds:
  deficient:
    value: 60
    unit: "mcmol/L"
  normal:
    range: [60, 120]
    unit: "mcmol/L"
recommendations:
  deficient: "Histidine levels are low. Increase intake of histidine-rich foods like pork, beef, chicken, turkey, fish, cheese, and legumes. Supplements may be considered under medical supervision."
  normal: "Histidine levels are normal."
effective_for:
  possibly_ineffective:
    - "Relieving pain in rheumatoid arthritis"
    - "Improving anemia associated with kidney disease or hemodialysis"
  insufficient_evidence:
    - "Anemia due to folate deficiency"
    - "Allergies"
    - "Ulcers"
    - "Increasing muscle power or athletic performance"
supplements:
  info: "Oral L-histidine supplements are available over-the-counter. Also used as a chelator in zinc and copper supplements."
  safety: "Possibly safe for most people in recommended doses. Doses up to 4g/day have no known side effects."
  warnings:
    - "Avoid during pregnancy and breastfeeding due to insufficient safety data."
    - "Avoid if folic acid deficient; may cause accumulation of formiminoglutamic acid."
disorders:
  histidinemia: "Rare inherited disorder with increased blood/urine histidine. Usually asymptomatic and requires no therapy."
