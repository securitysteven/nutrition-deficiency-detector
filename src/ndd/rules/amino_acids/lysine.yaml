name: "Lysine"
abbreviation: "Lys"
type: "Essential Amino Acid"
biomarker: "Lysine (Plasma)"
unit: "mcmol/L"
functions:
  - "Synthesis of carnitine (helps convert fats into energy)"
  - "Synthesis of collagen (gives strength to bones, cartilage, and skin)"
  - "Synthesis of other proteins"
  - "Calcium absorption"
  - "Ketogenic amino acid (can be converted into ketones)"
  - "Non-glucogenic amino acid (cannot be converted into glucose)"
  - "Basic amino acid (pH >7)"
food_sources:
  high:
    animal: ["Beef", "Pork", "Poultry", "Sardines", "Eggs"]
    plant: ["Spirulina", "Soy products", "Brewer's yeast", "Green beans", "Peas", "Lentils", "Spinach", "Amaranth", "Nuts", "Fenugreek seed"]
  low: ["Grains (wheat, millet, bulgur, kamut, corn, oats, barley, rice)", "Potatoes", "Tapioca", "Seeds", "Nuts"]
thresholds:
  low:
    value: 100
    unit: "mcmol/L"
  normal:
    range: [100, 250]
    unit: "mcmol/L"
recommendations:
  low: "Lysine levels are low. Increase intake of protein-rich foods such as beef, pork, poultry, fish, eggs, soy products, and legumes. Deficiency may result in fatigue, nausea, and impaired growth."
  normal: "Lysine levels are normal."
effective_for:
  possibly_effective:
    - "Treatment of lysine deficiency"
    - "Replacement of lysine in individuals with lysinuric protein intolerance (long-term effects questionable)"
    - "Treatment of labial herpes (cold sores)"
    - "Relieving migraine headache (using lysine acetylsalicylate)"
    - "Increasing calcium absorption"
  probably_ineffective:
    - "Prevention or treatment of genital herpes"
    - "Increasing growth hormone levels or muscle mass (anabolic effect)"
supplements:
  info: "Oral lysine supplements (tablets, capsules, liquids) include Lysine dihydrochloride, L-lysine monohydrochloride, etc. Creams are also available."
  safety: "Oral doses up to 40 grams per day are possibly safe. Side effects may include nausea, abdominal pain, and diarrhea."
  warnings:
    - "Avoid during pregnancy and breastfeeding (insufficient evidence)."
    - "Avoid in individuals with liver or kidney disease unless prescribed by a doctor."
  interactions:
    - "May increase absorption of supplemental calcium."
    - "May enhance toxicity of aminoglycoside antibiotics (e.g., gentamicin)."
disorders:
  hyperlysinemia:
    description: "Rare genetic disorder with increased blood lysine levels due to lack of breakdown enzyme."
    symptoms: "Usually asymptomatic; some may have intellectual disabilities or behavioral problems."
    treatment: "Low-protein diet (sometimes prescribed)."
  lysinuric_protein_intolerance_lpi:
    description: "Rare hereditary disorder with reduced absorption and increased excretion of lysine, ornithine, and arginine."
    symptoms: "Vomiting, diarrhea, poor appetite, enlarged liver/spleen, muscle weakness, failure to thrive, coma (due to high ammonia)."
    treatment: "Low-protein diet, oral lysine and citrulline supplements."
    complications: "Osteoporosis, impaired function of lungs, pancreas, and kidneys."
  glutaric_aciduria_type_1:
    description: "Condition requiring limited lysine intake."
  pellagra:
    description: "Vitamin B3 (niacin) deficiency caused by lysine deficiency."
