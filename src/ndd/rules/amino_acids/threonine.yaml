name: "Threonine"
abbreviation: "Thr"
type: "Essential Amino Acid"
biomarker: "Threonine (Plasma)"
unit: "mcmol/L"
functions:
  - "Building block of proteins"
  - "Precursor of the amino acids serine and glycine (glycine acts as an inhibitory neurotransmitter in the brain, which reduces spasticity)"
  - "Glucogenic amino acid (can be converted into glucose)"
  - "Ketogenic amino acid (can be converted into ketones)"
food_sources:
  high:
    animal: ["Meat", "Fish", "Cheese"]
    plant: ["Beans", "Lentils", "Wheat germ", "Seeds", "Baker’s yeast", "Spirulina"]
  low: ["Cereals (except wheat germ)", "Fruits", "Vegetables"]
thresholds:
  low:
    value: 60
    unit: "mcmol/L"
  normal:
    range: [60, 200]
    unit: "mcmol/L"
recommendations:
  low: "Threonine levels are low. Increase intake of protein-rich foods such as meat, fish, cheese, beans, and lentils. Deficiency in humans is rare."
  normal: "Threonine levels are normal."
effective_for:
  possibly_effective:
    - "Treatment of spinal spasticity"
    - "Treatment of phenylketonuria"
    - "Treatment of tyrosinemia type I"
  possibly_ineffective:
    - "Treatment of amyotrophic lateral sclerosis (Lou Gehrig’s disease)"
  insufficient_evidence:
    - "Prevention or treatment of anxiety"
    - "Prevention or treatment of depression"
    - "Prevention or treatment of multiple sclerosis"
    - "Prevention or treatment of familial spastic paraparesis"
    - "Boosting immune system"
supplements:
  info: "Oral L-threonine supplements (over-the-counter) are available."
  safety: "Doses up to 4 g/day for 12 months are possibly safe. Side effects may include nausea, stomach upset, headache, and skin rash."
  warnings:
    - "Avoid during pregnancy and breastfeeding (insufficient studies)."
    - "Individuals with methylmalonic acidemia or propionic acidemia may need to limit intake."
  interactions:
    - "May reduce the effectiveness of memantine (used in Alzheimer’s disease)."
disorders:
  methylmalonic_acidemia:
    description: "Condition requiring limited threonine intake."
  propionic_acidemia:
    description: "Condition requiring limited threonine intake."
