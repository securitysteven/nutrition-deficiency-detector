name: "Vitamin B2"
abbreviations: ["B2", "Riboflavin"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Riboflavin (Blood test)"
units:
  primary: "mcg/L"
  info: "Deficiency diagnosed by blood test"
functions:
  - "Energy production from food"
  - "Metabolism of glucose"
  - "Maintaining healthy skin"
  - "Tissue respiration cofactor"
  - "Metabolism of vitamins B3, B6, B9, and iron"
  - "Antioxidant activity (biochemical level)"
rda:
  men: "1.3 mg/day"
  women: "1.1 mg/day"
  pregnancy: "1.4 mg/day"
  breastfeeding: "1.6 mg/day"
food_sources:
  high_plant: ["Fortified cereals (0.5-6 mg/cup)", "Yeast extract spread (2.2 mg/tbsp)", "Vegetarian fillets (0.8 mg/3 oz)", "Cornmeal (0.6 mg/cup)", "Pasta (0.6 mg/130 g)", "Orange/Grape juice (1.1 mg/cup)", "Spinach/Broccoli (0.1-0.4 mg/cup)"]
  high_animal: ["Beef liver (3 mg/3 oz)", "Chicken liver (2 mg/3 oz)", "Mollusks (1.5 mg/3 oz)", "Whey", "Beef/Game/Goose meat", "Salmon", "Cheese (Monterey, Swiss)", "Milk", "Eggs"]
  fortified: ["Flour (baked products)", "Morning cereals", "Certain chocolate bars and beverages"]
  low: ["Unfortified white rice", "Apples", "Pears", "Plums"]
  notes: "Cooking and UV light exposure can destroy riboflavin. Store in dark places."
thresholds:
  deficient:
    value: 1
    unit: "mcg/L"
    note: "Symptoms can appear within a few weeks of reduced intake."
  normal:
    range: [1, 19]
    unit: "mcg/L"
recommendations:
  deficient: "Ariboflavinosis indicated. Symptoms include magenta red tongue, angular stomatitis, and oily skin. Treat with riboflavin supplements (5-30 mg/day)."
  normal: "Riboflavin levels are normal. Healthy individuals on regular diets generally do not need supplements."
deficiency:
  at_risk: ["Chronic alcoholics", "Starvation/Anorexia", "Celiac/Crohn's disease", "HIV/AIDS", "Cancer", "Chronic kidney failure (low-protein diet)", "Hypothyroidism", "Adrenal insufficiency", "Premature infants on phototherapy"]
  symptoms:
    - "Sore and magenta red tongue/throat (glossitis)"
    - "Cracks in corners of lips (angular stomatitis or cheilosis)"
    - "Oily, scaly skin around nose/scrotum (seborrheic dermatitis)"
    - "Vessel growth in cornea, itchy eyes, night blindness"
    - "Anemia (paleness, fatigue)"
  risks_if_untreated: ["Cataracts", "Migraine", "Peripheral neuropathy", "Heart disease", "Preeclampsia", "Birth defects (cleft lip/palate)"]
supplements:
  forms: ["Riboflavin", "Riboflavin-5-phosphate (monophosphate)"]
  available_doses: ["10 mg", "15 mg", "20 mg", "100 mg", "200 mg", "250 mg", "300 mg", "400 mg"]
  effective_for: ["Riboflavin deficiency treatment"]
  possibly_effective: ["Reducing migraine frequency (400 mg/day)", "Preventing cataracts (2.6 mg/day)"]
  dosage_guidelines:
    deficiency: "5-30 mg/day"
    migraine_prevention: "400 mg/day"
    cataract_prevention: "2.6 mg/day (Note: >10 mg/day may worsen cataracts)"
safety:
  general: "No toxic effects identified; excess excreted in urine. No UL set."
  side_effects: ["Diarrhea/Polyuria (high doses like 400 mg/day)", "Flavinuria (bright yellow/orange urine/stool - harmless)"]
  pregnancy_category:
    A: "Within RDA (1.4 mg/day)"
    C: "Above 1.4 mg/day (Insufficient human studies)"
  breastfeeding: "Safe to use"
interactions:
  medications_reducing_activity: ["Quinine", "Chlorpromazine", "Tricyclic antidepressants", "Adriamycin", "Phenobarbitol"]
  positive_interactions: ["Increases bioavailability of iron in deficiency"]
  required_for: ["Vitamin B3, B6, B9, B12, Iron, and Zinc"]
notes:
  absorption: "In upper small intestine (jejunum); better with food."
  body_stores: "Depleted within several weeks (water-soluble)."
  faq: "Other name: Riboflavin (from ribose and 'flavus' for yellow)."
