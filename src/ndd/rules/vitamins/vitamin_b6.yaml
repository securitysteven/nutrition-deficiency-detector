name: "Vitamin B6"
abbreviations: ["B6", "Pyridoxine"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Pyridoxal 5'-phosphate (PLP)"
units:
  primary: "nmol/L"
  info: "Vitamin B6 forms: pyridoxine, PNP, pyridoxal, PLP, pyridoxamine, PMP."
functions:
  - "Synthesis of glucose from glycogen (glycogenolysis) and amino acids (gluconeogenesis)"
  - "Synthesis of amino acids and proteins (including myelin formation)"
  - "Synthesis of vitamin B3 (niacin) from tryptophan"
  - "Synthesis of neurotransmitters (serotonin, norepinephrine, dopamine, GABA)"
  - "Synthesis of hemoglobin"
  - "Development of lymphocytes and immune system function"
rda:
  adults_19_50: "1.3 mg/day"
  men_51_plus: "1.7 mg/day"
  women_51_plus: "1.5 mg/day"
  pregnancy: "1.9 mg/day"
  breastfeeding: "2.0 mg/day"
food_sources:
  high_plant: ["Fortified ready-to-eat cereals", "Sweet potatoes", "Potatoes", "Yam", "Taro", "Grains (brown rice, corn, wheat)", "Prunes", "Bananas", "Avocado", "Jackfruit", "Legumes", "Spinach", "Pistachios", "Sunflower seeds"]
  high_animal: ["Red meat", "Poultry", "Liver", "Fish"]
  notes: "Cooking can reduce content by 50%; freezing and drying have no significant effect."
thresholds:
  deficient:
    value: 20
    unit: "nmol/L"
    note: "Deficiency is rare and often occurs with other B-vitamin deficiencies."
  low:
    range: [20, 30]
    unit: "nmol/L"
  normal:
    range: [30, 110]
    unit: "nmol/L"
recommendations:
  deficient: "Vitamin B6 deficiency indicated. Symptoms may include mouth ulcers, dermatitis, microcytic anemia, and neurological issues. Risk of heart disease/stroke due to high homocysteine."
  low: "Vitamin B6 levels are borderline low. Increase intake of fortified cereals, potatoes, bananas, and animal proteins."
  normal: "Vitamin B6 levels are normal."
deficiency:
  causes: ["Low intake (starvation, alcoholism)", "Chronic kidney disease", "Malabsorption (Crohn's, celiac disease)", "Rheumatoid arthritis", "Homocystinuria (genetic)", "Medications (Theophylline, Isoniazid, Cycloserine, Penicillamine, L-dopa)"]
  symptoms: ["Mouth ulcers", "Angular cheilitis", "Seborrheic dermatitis", "Eczema", "Acne", "Microcytic anemia (pale skin, fatigue)", "Anxiety", "Depression", "Confusion", "Seizures", "Tingling in hands and feet"]
supplements:
  forms_otc: ["Pyridoxal phosphate", "Pyridoxine hydrochloride (Tablets, Capsules, Solutions)"]
  forms_prescription: ["Pyridoxine hydrochloride (IM/IV injection, Nasal spray)"]
  effective_for: ["Pyridoxine deficiency prevention/treatment", "Pyridoxine-responsive sideroblastic anemia", "Pyridoxine-dependent epilepsy (infants)"]
  possibly_effective: ["Reducing homocysteine levels", "Kidney stones (Primary hyperoxaluria type 1)", "Tardive dyskinesia", "Homocystinuria"]
  insufficient_evidence: ["Acne", "Hangover", "Morning sickness", "PMS", "Carpal tunnel", "ADHD", "Autism", "Alzheimer's", "Asthma"]
safety:
  upper_limit: "100 mg/day"
  toxicity_symptoms: ["Nausea", "Vomiting", "Stomach pain", "Headache", "Photosensitivity", "Numbness/tingling", "Unstable gait", "Sleepiness"]
  overdose_chronic: "Doses >1 g/day may cause permanent sensory neuropathy, ataxia, and drop in blood folate levels."
  pregnancy_category: "C (Insufficient studies to exclude all risks)"
interactions:
  medications_reducing_effectiveness: ["Theophylline", "Isoniazid", "Cycloserine", "Penicillamine", "L-dopa"]
  b6_reducing_effectiveness_of: ["Phenobarbital", "Phenytoin", "L-dopa"]
  other: ["Amiodarone (increased risk of sunburn)"]
notes:
  etymology: "From pyridine (pyrid-), hydroxyl groups (ox-), and amino group (-ine)."
