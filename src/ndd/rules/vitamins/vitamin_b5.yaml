name: "Vitamin B5"
abbreviations: ["B5", "Pantothenic Acid", "Pantothenate"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Pantothenic Acid (Blood/Serum)"
units:
  primary: "mg/day (AI)"
  info: "Widely present in foods. Part of Coenzyme A (CoA)."
functions:
  - "Energy release from foods"
  - "Synthesis of hemoglobin"
  - "Synthesis of neurotransmitters"
  - "Part of coenzyme A (CoA) in energy metabolism"
ai:
  adults: "5 mg/day"
  pregnancy: "6 mg/day"
  breastfeeding: "7 mg/day"
food_sources:
  high_plant: ["Fortified ready-to-eat cereals", "Grains (rice, oats, wheat)", "Rice bran", "Mushrooms", "Avocado", "Corn", "Sunflower seeds", "Potatoes", "Dark green leafy vegetables", "Spirulina", "Lentils", "Peas", "Beans"]
  high_animal: ["Organ meats (liver, heart, brain)", "Beef", "Pork", "Fish", "Seafood", "Egg yolks", "Whey"]
  other: ["Yeast extract"]
  notes: "Freezing and food processing can reduce content by 35-75%."
thresholds:
  deficient:
    value: 10
    unit: "mcg/dL"
    note: "Deficiency is rare and occurs only in severe malnutrition."
  normal:
    range: [10, 100]
    unit: "mcg/dL"
recommendations:
  deficient: "Vitamin B5 deficiency indicated. Symptoms include fatigue and burning/tingling feet ('burning feet syndrome')."
  normal: "Pantothenic acid levels are normal."
deficiency:
  causes: ["Severe malnutrition"]
  symptoms: ["Fatigue", "Burning and tingling feet"]
supplements:
  forms_otc: ["Pantothenol (alcohol derivative)", "D-pantothenate (calcium or sodium salt)"]
  effective_for: ["Treating or preventing deficiency"]
  synthetic_derivatives:
    pantethine: "May reduce blood cholesterol and triglyceride levels."
  insufficient_evidence: ["Acne", "Alcoholism", "Allergies", "Anxiety", "Arthritis", "Asthma", "ADHD", "Autism", "Carpal tunnel", "CFS", "Colitis", "Cold", "Diabetes", "Hair loss", "Insomnia"]
safety:
  tolerable_dose: "Well tolerated up to 1,200 mg/day."
  overdose: "Doses of 10-20 g/day may cause diarrhea."
  warnings: ["Avoid if you have hemophilia", "Avoid if you have gastrointestinal blockage"]
  pregnancy_category: "C (Insufficient studies to exclude all risks)"
notes:
  etymology: "From Greek 'pantothen' meaning 'from every side'."
