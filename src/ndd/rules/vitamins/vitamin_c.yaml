name: "Vitamin C"
abbreviations: ["Ascorbic Acid"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Plasma Vitamin C (Ascorbic Acid)"
units:
  primary: "micromoles/L"
  secondary: "mg/dL"
  info: "Absorbed in small intestine. Body pool ~2g. Scurvy occurs below 350mg stores."
functions:
  - "Synthesis of collagen (strength for bones, ligaments, skin, blood vessels)"
  - "Synthesis of norepinephrine (neurotransmitter)"
  - "Synthesis of L-carnitine (fat metabolism)"
  - "Protection against free radicals (antioxidant activity)"
  - "Regenerates other antioxidants like vitamin E"
rda:
  men: "90 mg/day"
  women: "75 mg/day"
  pregnancy: "85 mg/day"
  breastfeeding: "120 mg/day"
food_sources:
  high_plant: ["Acerola juice", "Guava", "Kiwi fruit", "Litchis", "Orange juice", "Rose hips", "Pummelo", "Nance", "Black currants", "Orange", "Lemon/Grapefruit juice", "Papaya", "Peppers (red/yellow/green)", "Strawberries", "Broccoli", "Brussels sprouts"]
  high_animal: ["Beef spleen", "Liver (chicken, turkey, pork)", "Beef brain"]
  notes: "Freezing, storage, drying, and cooking can significantly reduce content (20-80%). Organ meats are high; other animal foods have moderate amounts."
thresholds:
  deficient:
    value: 11.4
    unit: "micromoles/L"
    alt_value: 0.2
    alt_unit: "mg/dL"
    note: "Scurvy symptoms appear below 10 mg/day intake."
  low:
    range: [11.4, 23.0]
    unit: "micromoles/L"
    alt_range: [0.2, 0.4]
    alt_unit: "mg/dL"
  normal:
    range: [23.0, 85.0]
    unit: "micromoles/L"
    alt_range: [0.4, 1.5]
    alt_unit: "mg/dL"
recommendations:
  deficient: "Vitamin C deficiency indicated. Risk of scurvy. Symptoms: bleeding gums, easy bruising, swollen joints. Supplementation stops bleeding in days, corrects anemia in a month."
  low: "Vitamin C levels are low. Increase intake of fresh fruits and vegetables."
  normal: "Vitamin C levels are normal."
  high: "Excessive intake (>2g/day) may cause nausea, diarrhea, or kidney stones in susceptible individuals."
deficiency:
  causes:
    dietary: ["Low intake (anorexia, alcoholism, drug abuse)", "Exclusive cow milk diet in babies", "'Bread and water' diet"]
    malabsorption: ["Celiac disease", "Crohn's disease", "Whipple disease", "Gastric bypass"]
    increased_demand: ["Smoking", "Cancer", "Thyrotoxicosis", "Pregnancy/Breastfeeding", "Hemodialysis"]
  symptoms:
    early: ["Fatigue", "Loss of appetite", "Diarrhea"]
    scurvy: ["Slow wound healing", "Easy bruising", "Bleeding gums", "Dry corkscrew hair", "Liver spots on legs", "Swollen joints", "Muscle weakness"]
  infants: ["Pallor", "Irritability", "Severe limb pain", "Poor weight gain"]
  complications: ["Anemia", "Jaundice", "Respiratory infections", "Bone fractures", "Low serotonin", "Tyrosinemia (infants)", "Gastric cancer"]
supplements:
  forms_otc: ["L-ascorbic acid (natural/synthetic)", "Sodium ascorbate", "Calcium ascorbate", "Ascorbyl palmitate", "With minerals (Chromium, Magnesium, etc.)", "With bioflavonoids"]
  forms_prescription: ["Intravenous injections (high doses/cancer research)"]
  effective_for: ["Deficiency treatment", "Iron absorption improvement (plant foods)", "Reducing gallbladder disease risk (women)", "Lowering LDL/triglycerides", "Dilation of coronary arteries in atherosclerosis", "Tyrosinemia"]
safety:
  upper_limit: "2 g/day"
  side_effects: ["Nausea", "Vomiting", "Heartburn", "Stomach cramps", "Headache", "Diarrhea (large doses)", "Migraine (6g/day)", "Dizziness (rapid IV)"]
  pregnancy_category: "C (Above 85 mg/day)"
  warnings: ["Avoid if allergic to Vitamin C", "Avoid in hemochromatosis", "Avoid in G6PD deficiency", "Caution with oxalate kidney stones", "Avoid before scheduled angioplasty"]
interactions:
  increases: ["Iron absorption from plant foods", "Estrogen effects/side effects"]
  decreases: ["Niacin (B3) effectiveness", "Warfarin effectiveness", "Fluphenazine effectiveness", "Amprenavir/Nelfinavir (HIV/AIDS) effectiveness", "Statin effectiveness (when combined with E/Beta-carotene/Selenium)"]
  other: ["Taken with grape seed extract might increase blood pressure", "Aspirin and estrogen contraceptives decrease absorption"]
notes:
  erythorbic_acid: "D-isoascorbic acid has same structure but NO Vitamin C activity; used as food antioxidant (E315)."
  absorption_efficiency: "70-100% at <200mg/day; ~50% at >1g/day. Excess excreted by kidneys when plasma >60-80 micromoles/L."
