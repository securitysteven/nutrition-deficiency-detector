name: "Vitamin B3"
abbreviations: ["B3", "Niacin", "Niacinamide", "Nicotinic acid", "Nicotinamide", "PP Factor"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Niacin (Serum/Plasma)"
units:
  primary: "mg/day (RDA)"
  info: "Absorbed in stomach and upper small intestine. Body can synthesize 1mg niacin from 60mg tryptophan."
functions:
  - "Energy production from food"
  - "Nicotinamide is part of NAD (conversion of nutrients into energy)"
  - "Part of NADP (synthesis of fatty acids)"
  - "Pellagra preventative (PP factor)"
rda:
  men: "16 mg/day"
  women: "14 mg/day"
  pregnancy: "18 mg/day"
  breastfeeding: "17 mg/day"
food_sources:
  high_plant: ["Ready-to-eat cereals (especially enriched)", "Wheat", "Buckwheat", "Millet", "Spelt", "Rice", "Rice bran", "Barley", "Peanuts", "Spirulina", "Bread", "Potatoes", "Mushrooms", "Peaches"]
  high_animal: ["Chicken", "Turkey", "Pork", "Beef", "Veal", "Lamb", "Fish"]
  other: ["Yeast extract spread", "Baker's and brewer's yeast", "Beer"]
  notes: "Cooking can decrease niacin content by 40%, draining by 15%. Synthesis from tryptophan requires 60:1 ratio."
thresholds:
  deficient:
    value: 0.5
    unit: "mcg/mL"
    note: "Deficiency lasting few months causes Pellagra."
  normal:
    range: [0.5, 8.0]
    unit: "mcg/mL"
recommendations:
  deficient: "Pellagra indicated (Four Ds: Dermatitis, Diarrhea, Dementia, Death). Symptoms include rough scaling skin on sun-exposed areas. Treat with niacin/niacinamide supplements."
  normal: "Vitamin B3 levels are normal."
  high: "Excessive intake (>3g/day) can cause liver/kidney problems, gout, and high blood sugar."
deficiency:
  causes: ["Low intake (alcoholism)", "Cornmeal-based diet (poor absorption)", "Malabsorption (Celiac, Crohn's, Hartnup disease)", "Increased demand (Carcinoid syndrome)", "Drug interactions (Isoniazid)"]
  symptoms_pellagra:
    four_ds: ["Dermatitis (rough, scaly skin on sun-exposed areas)", "Diarrhea", "Dementia", "Death"]
    other: ["Fatigue", "Depression", "Memory loss"]
supplements:
  forms_otc: ["Niacin (Crystalline, Slow-release)", "Niacinamide", "Inositol hexanicotinate (Flush-free)"]
  forms_prescription: ["Extended-release niacin"]
  effective_for: ["Deficiency treatment", "Lipid management (raises HDL, lowers LDL/triglycerides) - Niacin only at 2-3g/day"]
  possibly_effective: ["Cardiovascular disease events reduction", "Lowering phosphate in kidney disease"]
safety:
  upper_limit: "35 mg/day (OTC for adults)"
  side_effects: ["Niacin Flush (redness, tingling, itching)", "Nausea", "Stomach upset", "Elevated blood glucose", "Low blood pressure", "Arrhythmia"]
  flush_info: "Occurs with niacin >50mg. Can be mitigated by aspirin (325mg) 30 mins before or taking with food."
  overdose: "Doses >3g/day: Liver/gallbladder damage, gout, high blood sugar, thrombocytopenia."
  warnings: "Avoid if liver/kidney damage, peptic ulcer, bleeding problems, or upcoming surgery."
  pregnancy_category: "C (Insufficient studies to exclude all risks)"
interactions:
  - "Statins (risk of rhabdomyolysis)"
  - "Clonidine (low blood pressure)"
  - "Chromium (low blood sugar)"
  - "Cholestyramine/Colestipol (reduced absorption)"
  - "Gout medications (reduced effectiveness of Allopurinol/Probenecid)"
  - "Hepatotoxic herbs/supplements (Androstenedione, Kava, Red yeast extract, etc.)"
notes:
  forms_comparison:
    niacin: "Raises HDL, lowers LDL; causes flushing."
    niacinamide: "Does not affect lipids; rarely causes flushing; used to fortify foods."
  absorption: "Stomach and upper small intestine."
