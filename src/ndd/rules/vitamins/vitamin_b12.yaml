name: "Vitamin B12"
abbreviations: ["B12", "Cobalamin"]
type: "Essential Nutrient / Water-soluble Vitamin"
biomarker: "Vitamin B12 (Serum)"
units:
  primary: "ng/L"
  secondary: "pmol/L"
  info: "Contains cobalt. Absorbed in terminal ileum with intrinsic factor (IF)."
functions:
  - "Synthesis of DNA (production of red blood cells and other cells)"
  - "Synthesis of methionine from homocysteine (lowers homocysteine)"
  - "Synthesis of proteins and fats"
  - "Proper functioning of the nerves"
rda:
  adults: "2.4 mcg/day"
  pregnancy: "2.6 mcg/day"
  lactation: "2.8 mcg/day"
food_sources:
  high_animal: ["Shellfish (clams, oysters, mussels)", "Liver (beef, veal, lamb)", "Octopus", "Organ meats", "Fish (herring, mackerel, sardines, tuna, trout, salmon)", "Crabs", "Game meat", "Red meat", "Ostrich", "Cheese", "Turkey", "Milk", "Yogurt", "Pork", "Eggs"]
  vegan_sources: ["Fortified cereals", "Fortified plant milks", "Nutritional yeast (Saccharomyces cerevisiae) flakes", "Energy/sport drinks", "Meat substitutes"]
  notes: "Naturally present only in animal foods (produced by gut bacteria). Cooking/reheating can reduce content by up to 45% each. Plant foods like algae/seaweeds and fermented foods alone typically do not provide sufficient B12."
absorption:
  site: "Terminal ileum"
  requirements: ["Gastric acid", "Pancreatic enzymes", "Intrinsic factor (IF)", "Calcium"]
  efficiency: "Decreases with dose (50% at 1mcg, 1% at 1,000mcg)"
  body_stores: ">2.5 mg (Lasts 3-5 years after intake stops)"
thresholds:
  deficient:
    value: 150
    unit: "ng/L"
  borderline_low:
    range: [150, 400]
    unit: "ng/L"
  normal:
    range: [180, 914]
    unit: "ng/L"
recommendations:
  deficient: "Vitamin B12 deficiency indicated (<150 ng/L). Risk of Pernicious Anemia and permanent neurological damage. Consult healthcare provider for IM injections or high-dose oral therapy."
  low: "Borderline low levels (150-400 ng/L). Increase intake of B12-rich animal foods or fortified products."
  normal: "Vitamin B12 levels are normal."
  high: "High B12 levels (>914 ng/L) may be associated with liver disease, kidney disease, SIBO, or certain malignancies. Consult a doctor for further investigation."
deficiency:
  causes:
    malabsorption: ["Atrophic gastritis (H. pylori)", "Pernicious anemia (Autoimmune)", "Gastric bypass/surgery", "Chronic pancreatitis", "SIBO", "Fish tapeworm", "Celiac/Crohn's disease"]
    dietary: ["Strict vegan diet without supplementation", "Vegetarian diet with low dairy/egg intake"]
    other: ["Pregnancy/Breastfeeding loss", "Severe folate deficiency", "Inborn metabolic disorders"]
  symptoms:
    physical: ["Burning/reddened tongue", "Loss of appetite", "Constipation", "Weight loss", "Early satiety", "Lemon-yellow pallor", "Increased heart rate", "Low-grade fever"]
    neurological: ["Paresthesia (numbness/tingling in hands/feet)", "Weakness", "Unsteady gait (ataxia)", "Memory loss", "Irritability", "Depression"]
  complications: ["Neural tube defects in infants", "Osteoporosis", "Fatal pernicious anemia if untreated"]
diagnosis_tests: ["Blood Vitamin B12", "Homocysteine", "Methylmalonic acid (MMA)", "RBC count (Megaloblasts)", "IF Antibodies"]
supplements:
  forms_otc: ["Cyanocobalamin", "Methylcobalamin"]
  forms_prescription: ["Cyanocobalamin (Injection/Nasal)", "Hydroxocobalamin (Injection)"]
  vegan_dosage:
    daily: "25-100 mcg"
    weekly_twice: "1,000 mcg"
    weekly_once: "2,000 mcg"
  effective_for: ["Deficiency treatment", "Reducing homocysteine (with B6/Folate)", "Cyanide poisoning (Hydroxocobalamin)"]
safety:
  general: "No known toxicity from overdose; excess excreted."
  side_effects: ["Nausea", "Vomiting", "Diarrhea", "Blood clots", "Acne rosacea", "Allergic reactions"]
  injection_risks: ["Anxiety", "Dizziness", "Headache", "Arthritis", "Pulmonary edema", "Thrombosis"]
  pregnancy_category: "C (Above 2.6 mcg/day)"
  warnings: ["Avoid if allergic to cobalt", "Avoid in Leber's disease (risk of optic nerve damage)"]
  kidney_warning: "Avoid large dose Cyanocobalamin in CKD (cyanide metabolism issues)."
high_level_causes: ["Supplement overdose", "SIBO", "Liver disease", "Kidney failure", "Diabetes", "Cancer (Breast, Colon, Pancreatic, Leukemia)", "High-dose Vitamin A/C/Estrogen therapy"]
