name: "Vitamin A"
forms: ["Retinol", "Retinal", "Retinoic acid", "Beta-Carotene", "Alpha-Carotene", "Beta-Cryptoxanthin"]
type: "Fat-soluble Vitamin / Essential Nutrient"
biomarker: "Plasma Retinol"
units:
  primary: "mcmol/L"
  secondary: "mcg/dL"
functions:
  - "Visual pigments in retina (enables vision, especially night vision)"
  - "Maintenance of skin, hair, nails, cornea, and mucosal linings"
  - "Immune system support"
  - "Embryonic development and sperm production"
  - "Stimulates iron release from body stores"
  - "Antioxidant properties"
conversions:
  rae_to_mcg_retinol: 1
  rae_to_mcg_beta_carotene_supplements: 2
  rae_to_mcg_beta_carotene_food: 12
  rae_to_mcg_alpha_carotene_food: 24
  rae_to_mcg_beta_cryptoxanthin_food: 24
  iu_to_rae_retinol: 0.3
  iu_to_rae_beta_carotene_supplements: 0.15
  iu_to_rae_beta_carotene_food: 0.05
food_sources:
  high_animal_retinol: ["Beef liver", "Turkey liver", "Pork liver", "Chicken liver", "Cod liver oil", "Eel", "Hard cheeses"]
  high_plant_beta_carotene: ["Carrot juice", "Sweet potato", "Butternut squash", "Spinach", "Kale", "Cantaloupe"]
  fortified: ["Nutritional beverages", "Cereals", "Formulated bars", "Margarine", "Milk"]
thresholds:
  deficient:
    value: 0.7
    unit: "mcmol/L"
    alt_value: 20
    alt_unit: "mcg/dL"
  normal:
    value: 1.05
    unit: "mcmol/L"
    alt_value: 30
    alt_unit: "mcg/dL"
recommendations:
  deficient: "Vitamin A deficiency indicated. High risk of night blindness and xerophtalmia. Consult healthcare provider for high-dose supplementation (50,000-200,000 IU in severe cases)."
  low: "Liver stores may be depleted. Increase intake of retinol-rich animal foods or carotenoid-rich plants."
  normal: "Vitamin A levels are normal."
  high: "Risk of hypervitaminosis A. Limit intake of liver and high-dose supplements."
deficiency:
  causes: ["Insufficient intake", "Malabsorption (Crohn's, cystic fibrosis, etc.)", "Alcoholism", "Zinc or iron deficiency", "Protein deficiency"]
  symptoms: ["Night blindness", "Dry eyes (Bitot's spots)", "Dry skin (follicular hyperkeratosis)", "Frequent infections", "Diarrhea"]
supplements:
  forms: ["Retinyl acetate", "Retinyl palmitate", "Beta-carotene"]
  effective_for: ["Deficiency treatment", "Reducing complications of measles/diarrhea in children", "Retinitis pigmentosa"]
  safety:
    upper_limit: "3,000 mcg (10,000 IU)/day for adults"
    pregnancy_category: "X (High doses may cause birth defects)"
    pregnancy_limit: "3,000 mcg (10,000 IU)/day from all sources"
toxicity:
  acute: "Nausea, vomiting, headache, dizziness, blurred vision, brain edema"
  chronic: "Fatigue, depression, dry/itchy skin, bone/joint pain, liver disorders, osteoporosis risk (>5,000 IU/day)"
  carotenemia: "Harmless yellow skin discoloration from excessive beta-carotene intake"
interactions:
  - "Alcohol increases liver toxicity risk"
  - "Retinoid drugs (Isotretinoin, etc.) increase toxicity risk"
  - "Zinc deficiency decreases Vitamin A activity"
  - "Iron deficiency prevents effective correction of Vitamin A deficiency"
