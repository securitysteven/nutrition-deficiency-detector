name: "Molybdenum"
symbol: "Mo"
type: "Essential Trace Element"
biomarker: "Molybdenum (Serum)"
units:
  primary: "ng/mL"
  info: "Essential for the metabolism of sulfur-containing amino acids."
functions:
  - "Required for the metabolism of sulfur-containing amino acids (methionine and cysteine)"
  - "Cofactor for several enzymes involved in detoxification and metabolism"
rda:
  adults: "50 mcg/day"
food_sources:
  high: ["Legumes", "Grains", "Nuts", "Leafy vegetables", "Milk", "Cheese", "Organ meats"]
  notes: "Average American diet provides about 90 mcg/day."
thresholds:
  deficient:
    value: 0.1
    unit: "ng/mL"
  normal:
    range: [0.1, 3.0]
    unit: "ng/mL"
recommendations:
  deficient: "Molybdenum deficiency is extremely rare. Usually associated with rare genetic disorders or long-term parenteral nutrition without supplementation."
  normal: "Molybdenum levels are normal."
  high: "Excessive molybdenum intake (>2 mg/day) may cause gout-like symptoms or hallucinations."
deficiency:
  symptoms: ["Severe brain damage (in rare genetic diseases)"]
  notes: "Dietary deficiency is practically unknown in healthy individuals. Low soil levels in Linxian, China were linked to higher gastric and esophageal cancer rates, but supplements did not prevent them."
supplements:
  forms: ["Sodium molybdate", "Ammonium molybdate"]
  effective_for: ["Prevention and treatment of molybdenum deficiency"]
  insufficient_evidence: ["Acne", "Allergies", "Anemia", "Asthma", "Bell's palsy", "Dental caries", "Esophageal and other cancers", "Eczema", "Gout", "HIV/AIDS", "Insomnia", "Liver disease", "Lyme disease", "Multiple sclerosis", "Osteoporosis", "Sulfite sensitivity", "Systemic lupus erythematosus (SLE)", "Wilson's disease", "Yeast infections", "Libido stimulation"]
  notes: "Intended for treatment/prevention of deficiency, not for use by healthy people."
safety:
  upper_limit: "2 mg/day (UL for adults)"
  toxicity_symptoms: ["Gout-like symptoms (at 10-15 mg/day)", "Hallucinations (observed at 300-800 mcg supplemental doses in one study)"]
notes:
  soil_link: "Low soil molybdenum in certain regions (e.g., Linxian, China) has been studied for links to cancer due to high nitrosamine levels in plants."
