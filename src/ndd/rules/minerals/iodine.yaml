name: "Iodine"
symbol: "I"
type: "Essential Mineral"
biomarker: "Iodine (Serum)"
units:
  primary: "mcg/L"
  alt: "mcg/dL"
functions:
  - "Component of thyroid hormones triiodothyronine (T3) and thyroxine (T4)"
  - "Important for organ development, growth, metabolism, and reproduction"
rda:
  adults: "150 mcg/day"
  pregnancy: "220 mcg/day"
  breastfeeding: "290 mcg/day"
ai:
  infants_0_6m: "110 mcg/day"
  infants_7_12m: "130 mcg/day"
food_sources:
  plant:
    - "Seaweed (16-3,000 mcg per 1g)"
    - "Potato with skin, baked (60 mcg per medium)"
    - "Bread, white, enriched (45 mcg per 2 slices)"
    - "Navy beans (32 mcg per 1/2 cup)"
    - "Macaroni, enriched (27 mcg per 1 cup)"
    - "Corn, cream style (14 mcg per 1/2 cup)"
  animal:
    - "Cod (100 mcg per 3 oz)"
    - "Milk (55 mcg per 1 cup)"
    - "Yogurt, plain (55 mcg per 170 mL)"
    - "Fish sticks (55 mcg per 3 oz)"
    - "Shrimps (3 oz, 85 g)"
    - "Turkey breast (3 oz, 85 g)"
    - "Cheese (2 oz, 57 g)"
    - "Egg (1 large, 50 g)"
    - "Tuna (3 oz, 85 g)"
  other:
    - "Salt (iodized) (20-77 mcg per 1 gram)"
  notes: "Human breast milk iodine concentration depends on maternal intake (5 to 2,000 mcg/L)."
thresholds:
  deficient:
    value: 40
    unit: "mcg/L"
  normal:
    range: [40, 92]
    unit: "mcg/L"
recommendations:
  deficient: "Iodine deficiency indicated. Risk of goiter, hypothyroidism, or cretinism (in infants). Increase intake of iodized salt, seaweed, and seafood."
  normal: "Iodine levels are normal."
  high: "Excessive intake (>1,100 mcg/day) may cause thyroid dysfunction or iodermia."
deficiency:
  causes:
    - "Low iodine intake (soil depletion, non-iodized salt)"
    - "Goitrogens (cassava, soy, cabbage, broccoli - in susceptible individuals)"
    - "Selenium, iron, or vitamin A deficiency"
  symptoms:
    - "Goiter (enlarged thyroid gland)"
    - "Fatigue, impaired mental function"
    - "Low body temperature, cold intolerance"
    - "Weight gain, constipation"
    - "Increased risk of miscarriage"
    - "Infants: Cretinism (impaired brain development, mental retardation, short stature)"
  diagnosis:
    - "Blood tests: Low T3, Low T4, High TSH"
    - "Urine tests: Lowered iodine excretion"
supplements:
  forms_otc: ["Potassium iodide (in multivitamins)"]
  forms_prescription: ["Potassium iodide"]
  likely_effective:
    - "Prevention or treatment of iodine deficiency"
    - "Fibrocystic breast disease symptoms"
    - "Protection against radioactive iodine (I133) in nuclear accidents (taken within 48h before or 8h after)"
  possibly_effective:
    - "Conjunctivitis (pink eye)"
    - "Breast pain (mastalgia) related to menstrual cycle"
safety:
  upper_limit: "1,100 mcg (1.1 mg) per day for adults"
  side_effects: ["Nausea", "Stomach pain", "Runny nose", "Headache", "Metallic taste", "Diarrhea"]
  acute_poisoning_symptoms: ["Burning mouth/stomach", "Fever", "Diarrhea", "Coma"]
  chronic_toxicity_risks: ["Hypothyroidism", "Hyperthyroidism", "Autoimmune thyroid disease", "Thyroid papillary cancer", "Iodermia"]
  iodine_allergy_note: "True iodine allergy probably does not exist; reactions are usually to contrast dyes or seafood proteins."
interactions:
  drugs_increasing_levels: ["Amiodarone", "ACE inhibitors (captopril, enalapril)", "Angiotensin receptor blockers (losartan, valsartan)", "Diuretics (spironolactone, triamterene)"]
  thyroid_disruption: ["Amiodarone", "Erythrosine (E127)"]
  potentiated_effects: ["Medications for overactive thyroid (methenamine mandelate, methimazole)"]
notes:
  nuclear_protection: "Potassium iodide significantly lowers radioactive iodine uptake by the thyroid. Iodized salt is insufficient for this purpose."
  goitrogens: "Substances in cassava, soy, and cruciferous vegetables may lower iodine availability."
